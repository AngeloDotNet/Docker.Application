version: '3.7'

services:
  minio-server:
   container_name: minio-server
   build:
     context: .
     dockerfile: Dockerfile
   restart: always
   volumes:
     - /storage/CHANGEME:/data
     - /storage/CHANGEME:/root/.minio
   environment:
     - MINIO_ROOT_USER=admin
     - MINIO_ROOT_PASSWORD=YourStr0ngPassw0rd
   networks:
     - lan-network   
   ports:
     - 127.0.0.1:9000:9000
     - 127.0.0.1:9001:9001
   command: server /data --console-address ":9001"

networks:
   lan-network:
      external:
         name: docker-lan
